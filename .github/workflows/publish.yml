name: Publish to PyPI

# SAFETY: automatic publishing is DISABLED while the package is still being
# tested. This workflow runs only when triggered manually from the Actions tab,
# and even then the upload step runs only if you type "publish" in the confirm
# box. There is no `release:` or tag trigger, so cutting a GitHub Release or
# pushing a tag will NOT publish anything.
#
# When you are ready to publish for real:
#   1. Configure PyPI Trusted Publishing (once) at
#      https://pypi.org/manage/account/publishing/  -- project: commandants,
#      owner: yonibrowning, repo: commandants, workflow: publish.yml,
#      environment: pypi.
#   2. Optionally re-enable the `release:` trigger below for hands-off releases.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to upload to PyPI. Anything else = build only.'
        required: true
        default: "build-only"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    # Only publish on an explicit, typed confirmation from the manual trigger.
    if: ${{ github.event.inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/commandants
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
